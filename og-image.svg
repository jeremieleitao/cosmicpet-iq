<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="noisy"/>
      <feComposite in="noisy" in2="SourceGraphic" operator="in"/>
    </filter>
    <radialGradient id="gl" cx="22%" cy="52%" r="62%">
      <stop offset="0%" stop-color="#f43f8f" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#060b18" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gr" cx="82%" cy="42%" r="52%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#060b18" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gcard" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#f43f8f" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0d1628" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111b30"/>
      <stop offset="100%" stop-color="#0a1220"/>
    </linearGradient>
    <linearGradient id="iq-num" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97cb8"/>
      <stop offset="100%" stop-color="#f43f8f"/>
    </linearGradient>
    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f43f8f"/>
      <stop offset="100%" stop-color="#e0287d"/>
    </linearGradient>
    <linearGradient id="b1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
    <linearGradient id="b2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f43f8f"/>
      <stop offset="100%" stop-color="#f9a8d4"/>
    </linearGradient>
    <linearGradient id="b3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#fcd34d"/>
    </linearGradient>
    <clipPath id="card-clip">
      <rect x="690" y="52" width="450" height="526" rx="28"/>
    </clipPath>
  </defs>

  <!-- Base -->
  <rect width="1200" height="630" fill="#060b18"/>

  <!-- Noise grain -->
  <rect width="1200" height="630" fill="white" opacity="0.028" filter="url(#noise)"/>

  <!-- Glows -->
  <ellipse cx="240" cy="340" rx="500" ry="380" fill="url(#gl)"/>
  <ellipse cx="980" cy="310" rx="440" ry="360" fill="url(#gr)"/>

  <!-- Subtle dot-grid -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="rgba(255,255,255,0.04)"/>
  </pattern>
  <rect width="660" height="630" fill="url(#dots)"/>

  <!-- ─── LEFT SIDE ─── -->

  <!-- Brand pill -->
  <rect x="72" y="80" width="174" height="34" rx="17" fill="rgba(244,63,143,0.1)" stroke="rgba(244,63,143,0.32)" stroke-width="1.2"/>
  <circle cx="93" cy="97" r="5" fill="#f43f8f" opacity="0.9"/>
  <text x="107" y="102" font-family="-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#f9a8d4" font-weight="800" letter-spacing="1.8">PET IQ LAB</text>

  <!-- Headline -->
  <text x="72" y="210" font-family="Georgia,'Times New Roman',serif" font-size="74" font-weight="700" font-style="italic" fill="#f0f4ff" letter-spacing="-2">Is your pet</text>
  <text x="72" y="296" font-family="Georgia,'Times New Roman',serif" font-size="74" font-weight="700" font-style="italic" fill="#f0f4ff" letter-spacing="-2">secretly a</text>
  <text x="72" y="390" font-family="Georgia,'Times New Roman',serif" font-size="86" font-weight="700" font-style="italic" fill="#f43f8f" letter-spacing="-2">genius?  🧠</text>

  <!-- Divider -->
  <line x1="72" y1="422" x2="340" y2="422" stroke="rgba(244,63,143,0.22)" stroke-width="1.5"/>

  <!-- Subtitle -->
  <text x="72" y="455" font-family="-apple-system,'Helvetica Neue',sans-serif" font-size="18" fill="rgba(240,244,255,0.42)" font-weight="400" letter-spacing="0.2">Science-backed · 3 min · 5 cognitive dimensions</text>

  <!-- Social proof -->
  <text x="72" y="500" font-family="-apple-system,'Helvetica Neue',sans-serif" font-size="15" fill="rgba(240,244,255,0.28)" font-weight="500">⭐⭐⭐⭐⭐  1,240 pets tested this month</text>

  <!-- CTA pill -->
  <rect x="72" y="528" width="258" height="48" rx="24" fill="url(#cta)"/>
  <rect x="72" y="528" width="258" height="48" rx="24" fill="rgba(255,255,255,0.06)"/>
  <text x="201" y="558" text-anchor="middle" font-family="-apple-system,'Helvetica Neue',sans-serif" font-size="16" fill="white" font-weight="800" letter-spacing="0.2">Discover your pet's IQ →</text>

  <!-- URL -->
  <text x="72" y="608" font-family="'Courier New',Courier,monospace" font-size="13" fill="rgba(240,244,255,0.16)" letter-spacing="0.5">iq.thecosmicpet.com</text>

  <!-- ─── RIGHT SIDE — IQ CARD ─── -->

  <!-- Card -->
  <rect x="690" y="52" width="450" height="526" rx="28" fill="url(#card-bg)" stroke="rgba(244,63,143,0.16)" stroke-width="1.5"/>

  <!-- Card inner glow -->
  <rect x="690" y="52" width="450" height="526" rx="28" fill="url(#gcard)" clip-path="url(#card-clip)"/>

  <!-- Card top shimmer line -->
  <line x1="730" y1="52" x2="1100" y2="52" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- SCORE LABEL -->
  <text x="915" y="118" text-anchor="middle" font-family="-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="rgba(240,244,255,0.28)" font-weight="700" letter-spacing="3.5">PET IQ SCORE</text>

  <!-- Big IQ number -->
  <text x="915" y="248" text-anchor="middle" font-family="-apple-system,'Helvetica Neue',sans-serif" font-size="140" font-weight="900" fill="url(#iq-num)" letter-spacing="-6">128</text>

  <!-- Percentile sub -->
  <text x="915" y="282" text-anchor="middle" font-family="-apple-system,'Helvetica Neue',sans-serif" font-size="13" fill="rgba(240,244,255,0.28)" font-weight="500" letter-spacing="0.2">top 12% of dogs tested</text>

  <!-- Profile badge -->
  <rect x="785" y="298" width="260" height="38" rx="19" fill="rgba(244,63,143,0.12)" stroke="rgba(244,63,143,0.28)" stroke-width="1.2"/>
  <text x="915" y="322" text-anchor="middle" font-family="-apple-system,'Helvetica Neue',sans-serif" font-size="14" fill="#f9a8d4" font-weight="700" letter-spacing="0.2">⚡ The Quick Learner</text>

  <!-- Divider in card -->
  <line x1="720" y1="352" x2="1110" y2="352" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- DIMENSION BARS -->

  <!-- Memory -->
  <text x="720" y="382" font-family="-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="rgba(240,244,255,0.5)" font-weight="600">🧠  Memory</text>
  <text x="1110" y="382" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#818cf8" font-weight="700">80%</text>
  <rect x="720" y="390" width="390" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
  <rect x="720" y="390" width="312" height="6" rx="3" fill="url(#b1)"/>

  <!-- Social -->
  <text x="720" y="420" font-family="-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="rgba(240,244,255,0.5)" font-weight="600">👁  Social Intel.</text>
  <text x="1110" y="420" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#f43f8f" font-weight="700">70%</text>
  <rect x="720" y="428" width="390" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
  <rect x="720" y="428" width="273" height="6" rx="3" fill="url(#b2)"/>

  <!-- Problem Solving -->
  <text x="720" y="458" font-family="-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="rgba(240,244,255,0.5)" font-weight="600">🔧  Problem Solving</text>
  <text x="1110" y="458" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="#fb923c" font-weight="700">85%</text>
  <rect x="720" y="466" width="390" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
  <rect x="720" y="466" width="332" height="6" rx="3" fill="url(#b3)"/>

  <!-- Self-control — locked -->
  <text x="720" y="496" font-family="-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="rgba(240,244,255,0.18)" font-weight="600">🧘  Self-Control</text>
  <text x="1110" y="496" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="rgba(240,244,255,0.14)" font-weight="700">??%</text>
  <rect x="720" y="504" width="390" height="6" rx="3" fill="rgba(255,255,255,0.05)"/>

  <!-- Adaptability — locked -->
  <text x="720" y="532" font-family="-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="rgba(240,244,255,0.18)" font-weight="600">🌍  Adaptability</text>
  <text x="1110" y="532" text-anchor="end" font-family="'Courier New',monospace" font-size="12" fill="rgba(240,244,255,0.14)" font-weight="700">??%</text>
  <rect x="720" y="540" width="390" height="6" rx="3" fill="rgba(255,255,255,0.05)"/>

  <!-- Locked badge -->
  <rect x="820" y="554" width="190" height="28" rx="14" fill="rgba(0,0,0,0.35)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="915" y="573" text-anchor="middle" font-family="-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="rgba(240,244,255,0.28)" font-weight="600" letter-spacing="0.2">🔒  2 dimensions locked</text>

</svg>
